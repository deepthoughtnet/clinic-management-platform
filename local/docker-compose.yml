services:
  postgres:
    image: postgres:15
    container_name: clinic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinic_management
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic
    ports:
      - "5437:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic -d clinic_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: clinic-redis
    restart: unless-stopped
    ports:
      - "6383:6379"
    volumes:
      - ./data/redis:/data

  minio:
    image: minio/minio:latest
    container_name: clinic-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9005:9000"
      - "9006:9001"
    volumes:
      - ./data/minio:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: clinic-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8182:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import