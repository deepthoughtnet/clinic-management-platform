x-clinic-ai-env: &clinic-ai-env
  CLINIC_AI_ENABLED: ${CLINIC_AI_ENABLED:-true}
  CLINIC_AI_PROVIDER: ${CLINIC_AI_PROVIDER:-GEMINI}
  CLINIC_AI_REQUEST_TIMEOUT_SECONDS: ${CLINIC_AI_REQUEST_TIMEOUT_SECONDS:-60}
  CLINIC_GEMINI_ENABLED: ${CLINIC_GEMINI_ENABLED:-true}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
  GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
  GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-60}
  CLINIC_AI_MAX_ATTEMPTS: ${CLINIC_AI_MAX_ATTEMPTS:-3}
  CLINIC_AI_RETRY_BACKOFF_MS: ${CLINIC_AI_RETRY_BACKOFF_MS:-60000}
  CLINIC_OCR_ENABLED: ${CLINIC_OCR_ENABLED:-true}
  CLINIC_OCR_PROVIDER: ${CLINIC_OCR_PROVIDER:-TESSERACT}
  TESSERACT_EXECUTABLE_PATH: ${TESSERACT_EXECUTABLE_PATH:-tesseract}
  TESSERACT_DATA_PATH: ${TESSERACT_DATA_PATH:-/home/iadmin/code/clinic-management-platform/local/Tessaract-data}
  TESSERACT_LANGUAGE: ${TESSERACT_LANGUAGE:-eng}
  TESSERACT_RENDER_DPI: ${TESSERACT_RENDER_DPI:-200}
  TESSERACT_PAGE_SEG_MODE: ${TESSERACT_PAGE_SEG_MODE:-1}
  TESSERACT_OCR_ENGINE_MODE: ${TESSERACT_OCR_ENGINE_MODE:-1}
  TESSERACT_REQUIRE_DATA_PATH: ${TESSERACT_REQUIRE_DATA_PATH:-false}
  CLINIC_OCR_MAX_PAGES: ${CLINIC_OCR_MAX_PAGES:-10}

services:
  postgres:
    image: postgres:15
    container_name: clinic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinic_management
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic
    ports:
      - "5437:5432"
    volumes:
      - clinic_management_postgres_data:/var/lib/postgresql/data
      - ./init-sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic -d clinic_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: clinic-redis
    restart: unless-stopped
    ports:
      - "6383:6379"
    volumes:
      - clinic_management_redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: clinic-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9005:9000"
      - "9006:9001"
    volumes:
      - clinic_management_minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: clinic-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: clinic
      KC_DB_PASSWORD: clinic
    ports:
      - "8182:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  whisper-stt:
    image: ghcr.io/ggerganov/whisper.cpp:main
    container_name: clinic-whisper-stt
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - "set -e; if [ ! -f /models/ggml-base.en.bin ]; then curl -fL https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin -o /models/ggml-base.en.bin; fi; exec /app/build/bin/whisper-server --host 0.0.0.0 --port 8080 --model /models/ggml-base.en.bin"
    ports:
      - "8092:8080"
    volumes:
      - whisper_stt_models:/models
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://127.0.0.1:8080/health || curl -fsS http://127.0.0.1:8080/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s

  realtime-voice-gateway:
    build:
      context: ../backend/realtime/realtime-voice-runtime-python
      dockerfile: Dockerfile
    container_name: clinic-realtime-voice-gateway
    restart: unless-stopped
    environment:
      VOICE_GATEWAY_HOST: 0.0.0.0
      VOICE_GATEWAY_PORT: 8091
      VOICE_STT_PROVIDER: ${VOICE_STT_PROVIDER:-whisper-cpp-server}
      VOICE_STT_URL: ${VOICE_STT_URL:-http://whisper-stt:8080}
      VOICE_STT_MODEL: ${VOICE_STT_MODEL:-base.en}
      VOICE_STT_LANGUAGE: ${VOICE_STT_LANGUAGE:-en}
      VOICE_STT_DEVICE: ${VOICE_STT_DEVICE:-cpu}
      VOICE_STT_TIMEOUT_SECONDS: ${VOICE_STT_TIMEOUT_SECONDS:-30}
      VOICE_TTS_PROVIDER: ${VOICE_TTS_PROVIDER:-piper}
      VOICE_TTS_VOICE: ${VOICE_TTS_VOICE:-en_US-lessac-medium}
      VOICE_TTS_MODEL_DIR: ${VOICE_TTS_MODEL_DIR:-/var/lib/voice-models/piper}
      VOICE_TTS_AUTO_DOWNLOAD: ${VOICE_TTS_AUTO_DOWNLOAD:-true}
      VOICE_AI_ORCHESTRATION_URL: ${VOICE_AI_ORCHESTRATION_URL:-http://host.docker.internal:8089/actuator/health}
      VOICE_WS_MAX_SESSIONS: ${VOICE_WS_MAX_SESSIONS:-200}
      VOICE_MAX_ACTIVE_SESSIONS: ${VOICE_MAX_ACTIVE_SESSIONS:-100}
      VOICE_MAX_TRANSCRIPT_BUFFER: ${VOICE_MAX_TRANSCRIPT_BUFFER:-96}
      VOICE_SESSION_IDLE_TIMEOUT: ${VOICE_SESSION_IDLE_TIMEOUT:-300}
      VOICE_MODEL_CACHE_DIR: ${VOICE_MODEL_CACHE_DIR:-/var/lib/voice-models}
      VOICE_ENABLE_GPU: ${VOICE_ENABLE_GPU:-false}
      VOICE_WORKER_THREADS: ${VOICE_WORKER_THREADS:-2}
      PIPER_CLI: ${PIPER_CLI:-piper}
      PIPER_MODEL: ${PIPER_MODEL:-/var/lib/voice-models/piper/en_US-lessac-medium.onnx}
    ports:
      - "8091:8091"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8091/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    volumes:
      - realtime_voice_model_cache:/var/lib/voice-models
    depends_on:
      postgres:
        condition: service_healthy
      whisper-stt:
        condition: service_healthy

  clinic-management-api:
    profiles: ["api"]
    build:
      context: ..
      dockerfile: backend/api/api-bff/Dockerfile
    container_name: clinic-management-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      VOICE_RUNTIME_SUMMARY_ENDPOINT: ${VOICE_RUNTIME_SUMMARY_ENDPOINT:-http://realtime-voice-gateway:8091/metrics/summary}
    ports:
      - "8089:8089"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8089/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      keycloak:
        condition: service_started
      minio:
        condition: service_started

  web-admin:
    profiles: ["frontend"]
    build:
      context: ../web-admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8182}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-clinic-management}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-clinic-web-admin}
    container_name: clinic-web-admin
    restart: unless-stopped
    ports:
      - "5174:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    depends_on:
      clinic-management-api:
        condition: service_healthy

  # Future optional split services (placeholder only; not enabled in v1):
  # stt-service:
  # tts-service:

volumes:
  clinic_management_postgres_data:
  clinic_management_redis_data:
  clinic_management_minio_data:
  realtime_voice_model_cache:
  whisper_stt_models:
