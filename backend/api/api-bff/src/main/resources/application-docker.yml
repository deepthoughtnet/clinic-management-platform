spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/clinic_management
    username: clinic
    password: clinic
  data:
    redis:
      host: redis
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CLINIC_JWT_ISSUER_URI:http://keycloak:8080/realms/clinic-management}

clinic:
  keycloak:
    admin:
      serverUrl: ${CLINIC_KEYCLOAK_SERVER_URL:http://keycloak:8080}
  storage:
    minio:
      endpoint: ${CLINIC_MINIO_ENDPOINT:http://minio:9000}

voice:
  runtime:
    summary-endpoint: ${VOICE_RUNTIME_SUMMARY_ENDPOINT:http://realtime-voice-gateway:8091/metrics/summary}
