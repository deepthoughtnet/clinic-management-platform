spring:
  application:
    name: clinic-management-api

  datasource:
    url: jdbc:postgresql://localhost:5437/clinic_management
    username: clinic
    password: clinic

  data:
    redis:
      host: localhost
      port: 6383
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8182/realms/clinic-management

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  mvc:
    async:
      request-timeout: ${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:180000}

server:
  port: 8089
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

clinic:
  ai:
    enabled: ${CLINIC_AI_ENABLED:true}
    provider: ${CLINIC_AI_PROVIDER:GEMINI}
    provider-chain: ${AI_LLM_PROVIDER_ORDER:${AI_PROVIDER_CHAIN:${VOICE_LLM_PROVIDER_ORDER:gemini,groq,mock}}}
    request-timeout-seconds: ${CLINIC_AI_REQUEST_TIMEOUT_SECONDS:60}
    consultation:
      max-output-tokens: ${CLINIC_AI_CONSULTATION_MAX_OUTPUT_TOKENS:${GEMINI_MAX_OUTPUT_TOKENS:2048}}
    gemini:
      enabled: ${CLINIC_GEMINI_ENABLED:true}
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      temperature: ${GEMINI_TEMPERATURE:0.1}
      max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:2048}
      timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:${CLINIC_AI_REQUEST_TIMEOUT_SECONDS:60}}
    groq:
      enabled: ${CLINIC_GROQ_ENABLED:true}
      api-key: ${GROQ_API_KEY:}
      model: ${GROQ_MODEL:llama-3.1-8b-instant}
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
      temperature: ${GROQ_TEMPERATURE:0.1}
      max-output-tokens: ${GROQ_MAX_OUTPUT_TOKENS:2048}
      timeout-seconds: ${GROQ_TIMEOUT_SECONDS:${CLINIC_AI_REQUEST_TIMEOUT_SECONDS:60}}
    mock:
      enabled: ${AI_MOCK_ENABLED:true}
    jobs:
      fixedDelay: ${CLINIC_AI_JOB_FIXED_DELAY:PT1M}
      maxAttempts: ${CLINIC_AI_MAX_ATTEMPTS:3}
      retryBackoffMs: ${CLINIC_AI_RETRY_BACKOFF_MS:60000}

  ocr:
    enabled: ${CLINIC_OCR_ENABLED:true}
    provider: ${CLINIC_OCR_PROVIDER:TESSERACT}
    tesseract:
      executablePath: ${TESSERACT_EXECUTABLE_PATH:tesseract}
      dataPath: ${TESSERACT_DATA_PATH:}
      language: ${TESSERACT_LANGUAGE:eng}
      renderDpi: ${TESSERACT_RENDER_DPI:200}
      pageSegMode: ${TESSERACT_PAGE_SEG_MODE:1}
      ocrEngineMode: ${TESSERACT_OCR_ENGINE_MODE:1}
      requireDataPath: ${TESSERACT_REQUIRE_DATA_PATH:false}
      maxPages: ${CLINIC_OCR_MAX_PAGES:10}

  keycloak:
    admin:
      enabled: true
      serverUrl: http://localhost:8182
      adminRealm: master
      targetRealm: clinic-management
      clientId: admin-cli
      clientSecret: ${CLINIC_KEYCLOAK_CLIENT_SECRET:}
      username: ${CLINIC_KEYCLOAK_ADMIN_USERNAME:admin}
      password: ${CLINIC_KEYCLOAK_ADMIN_PASSWORD:admin}

  storage:
    minio:
      endpoint: ${CLINIC_MINIO_ENDPOINT:http://localhost:9005}
      access-key: ${CLINIC_MINIO_ACCESS_KEY:minio}
      secret-key: ${CLINIC_MINIO_SECRET_KEY:minio123}
      bucket: ${CLINIC_MINIO_BUCKET:clinic-documents}
      auto-create-bucket: ${CLINIC_MINIO_AUTO_CREATE_BUCKET:true}

  notifications:
    enabled: ${CLINIC_NOTIFICATIONS_ENABLED:true}
    channel: ${CLINIC_NOTIFICATIONS_CHANNEL:email}
    dispatcher:
      enabled: ${CLINIC_NOTIFICATIONS_DISPATCHER_ENABLED:true}
      pollingIntervalMs: ${CLINIC_NOTIFICATIONS_RETRY_INTERVAL_MS:30000}
      maxAttempts: ${CLINIC_NOTIFICATIONS_MAX_RETRIES:3}
      retryBackoffMs: ${CLINIC_NOTIFICATIONS_RETRY_BACKOFF_MS:60000}
      batchSize: ${CLINIC_NOTIFICATIONS_BATCH_SIZE:25}
    scheduler:
      enabled: ${CLINIC_NOTIFICATIONS_SCHEDULER_ENABLED:true}
      fixedDelay: ${CLINIC_NOTIFICATIONS_SCHEDULER_FIXED_DELAY:PT5M}
  carepilot:
    reminders:
      enabled: ${CLINIC_CAREPILOT_REMINDERS_ENABLED:false}
      fixed-delay: ${CLINIC_CAREPILOT_REMINDERS_FIXED_DELAY:PT15M}
      batch-size: ${CLINIC_CAREPILOT_REMINDERS_BATCH_SIZE:100}
      refill-estimated-days: ${CLINIC_CAREPILOT_REFILL_ESTIMATED_DAYS:30}
      billing-overdue-days: ${CLINIC_CAREPILOT_BILLING_OVERDUE_DAYS:3}
    retry:
      max-retries: ${CLINIC_CAREPILOT_MAX_RETRIES:3}
      initial-backoff-seconds: ${CLINIC_CAREPILOT_INITIAL_BACKOFF_SECONDS:60}
      max-backoff-seconds: ${CLINIC_CAREPILOT_MAX_BACKOFF_SECONDS:900}
      retryable-statuses: ${CLINIC_CAREPILOT_RETRYABLE_STATUSES:FAILED,PROVIDER_NOT_AVAILABLE,NOT_CONFIGURED}
    scheduler:
      enabled: ${CLINIC_CAREPILOT_SCHEDULER_ENABLED:false}
      fixedDelay: ${CLINIC_CAREPILOT_SCHEDULER_FIXED_DELAY:PT2M}
      batch-size: ${CLINIC_CAREPILOT_SCHEDULER_BATCH_SIZE:25}
    messaging:
      email:
        enabled: ${CLINIC_CAREPILOT_MESSAGING_EMAIL_ENABLED:false}
        provider: ${CLINIC_CAREPILOT_MESSAGING_EMAIL_PROVIDER:disabled}
        from-address: ${CLINIC_CAREPILOT_MESSAGING_EMAIL_FROM_ADDRESS:}
      sms:
        enabled: ${CLINIC_CAREPILOT_MESSAGING_SMS_ENABLED:false}
        provider: ${CLINIC_CAREPILOT_MESSAGING_SMS_PROVIDER:disabled}
        from-number: ${CLINIC_CAREPILOT_MESSAGING_SMS_FROM_NUMBER:}
        api-url: ${CLINIC_CAREPILOT_MESSAGING_SMS_API_URL:}
        api-key: ${CLINIC_CAREPILOT_MESSAGING_SMS_API_KEY:}
        sender-id: ${CLINIC_CAREPILOT_MESSAGING_SMS_SENDER_ID:}
        timeout-ms: ${CLINIC_CAREPILOT_MESSAGING_SMS_TIMEOUT_MS:5000}
        webhook-secret: ${CLINIC_CAREPILOT_SMS_WEBHOOK_SECRET:}
      whatsapp:
        enabled: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_ENABLED:false}
        provider: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_PROVIDER:disabled}
        api-url: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_API_URL:}
        access-token: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_ACCESS_TOKEN:}
        phone-number-id: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_PHONE_NUMBER_ID:}
        from-number: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_FROM_NUMBER:}
        business-account-id: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_BUSINESS_ACCOUNT_ID:}
        timeout-ms: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_TIMEOUT_MS:5000}
        webhook-verify-token: ${CLINIC_CAREPILOT_WHATSAPP_WEBHOOK_VERIFY_TOKEN:}
        app-secret: ${CLINIC_CAREPILOT_WHATSAPP_APP_SECRET:}
    provider:
      fail-fast: ${CLINIC_CAREPILOT_PROVIDER_FAIL_FAST:false}

  patient-portal:
    auth:
      otp-ttl: ${CLINIC_PATIENT_PORTAL_OTP_TTL:PT5M}
      resend-cooldown: ${CLINIC_PATIENT_PORTAL_RESEND_COOLDOWN:PT60S}
      max-attempts: ${CLINIC_PATIENT_PORTAL_MAX_ATTEMPTS:5}
      expose-dev-otp: ${CLINIC_PATIENT_PORTAL_EXPOSE_DEV_OTP:false}
      session-secret: ${CLINIC_PATIENT_PORTAL_SESSION_SECRET:local-patient-portal-session-secret}
      session-ttl: ${CLINIC_PATIENT_PORTAL_SESSION_TTL:PT12H}

aiva:
  response-composer:
    enabled: ${AIVA_RESPONSE_COMPOSER_ENABLED:false}
    timeout-seconds: ${AIVA_RESPONSE_COMPOSER_TIMEOUT_SECONDS:5}
    voice-only: ${AIVA_RESPONSE_COMPOSER_VOICE_ONLY:true}

logging:
  level:
    root: INFO
    com.deepthoughtnet.clinic: INFO
    org.springframework.security: INFO

voice:
  enabled: ${VOICE_TEST_ENABLED:true}
  default-language: ${AIVA_DEFAULT_LANGUAGE:hi-IN}
  response-language: ${AIVA_RESPONSE_LANGUAGE:hi-IN}
  sarvam:
    enabled: ${SARVAM_ENABLED:false}
    stt-enabled: ${SARVAM_STT_ENABLED:false}
    tts-enabled: ${SARVAM_TTS_ENABLED:false}
    api-key: ${SARVAM_API_KEY:}
    base-url: ${SARVAM_BASE_URL:https://api.sarvam.ai}
    stt-path: ${SARVAM_STT_PATH:/speech-to-text}
    tts-path: ${SARVAM_TTS_PATH:/text-to-speech}
    default-language: ${SARVAM_DEFAULT_LANGUAGE:hi-IN}
    response-language: ${SARVAM_DEFAULT_LANGUAGE:hi-IN}
    connect-timeout-ms: ${SARVAM_CONNECT_TIMEOUT_MS:10000}
    read-timeout-ms: ${SARVAM_READ_TIMEOUT_MS:60000}
  stt:
    provider-order: ${VOICE_STT_PROVIDER_ORDER:sarvam,faster-whisper,mock}
    faster-whisper:
      base-url: ${FASTER_WHISPER_BASE_URL:http://faster-whisper:8000}
      model: ${FASTER_WHISPER_MODEL:base}
      language: ${FASTER_WHISPER_LANGUAGE:en}
      connect-timeout-ms: ${FASTER_WHISPER_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${FASTER_WHISPER_READ_TIMEOUT_MS:180000}
    deepgram:
      api-key: ${DEEPGRAM_API_KEY:}
      model: ${DEEPGRAM_MODEL:nova-2}
      base-url: ${DEEPGRAM_BASE_URL:https://api.deepgram.com/v1/listen}
  tts:
    provider-order: ${VOICE_TTS_PROVIDER_ORDER:sarvam,piper,mock}
    piper:
      base-url: ${PIPER_TTS_BASE_URL:http://piper-tts:8001}
      voice: ${PIPER_DEFAULT_VOICE:${PIPER_VOICE:en_US-lessac-medium}}
      english-voice: ${PIPER_ENGLISH_VOICE:en_US-lessac-medium}
      hindi-voice: ${PIPER_HINDI_VOICE:}
      allow-fallback-voice: ${PIPER_ALLOW_FALLBACK_VOICE:true}
      connect-timeout-ms: ${PIPER_TTS_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${PIPER_TTS_READ_TIMEOUT_MS:120000}
    elevenlabs:
      api-key: ${ELEVENLABS_API_KEY:}
      voice-id: ${ELEVENLABS_VOICE_ID:}
      model: ${ELEVENLABS_MODEL:eleven_multilingual_v2}
      base-url: ${ELEVENLABS_BASE_URL:https://api.elevenlabs.io/v1/text-to-speech}
  llm:
    provider-order: ${VOICE_LLM_PROVIDER_ORDER:gemini,groq,mock}
    max-output-tokens: ${VOICE_LLM_MAX_OUTPUT_TOKENS:1024}
    max-history-turns: ${VOICE_LLM_MAX_HISTORY_TURNS:4}
    max-history-chars: ${VOICE_LLM_MAX_HISTORY_CHARS:900}
    max-answer-words: ${VOICE_LLM_MAX_ANSWER_WORDS:35}
  vad:
    enabled: ${VOICE_VAD_ENABLED:true}
    provider: ${VOICE_VAD_PROVIDER:noop}
    speech-start-threshold: ${VOICE_VAD_SPEECH_START_THRESHOLD:0.03}
    speech-end-threshold: ${VOICE_VAD_SPEECH_END_THRESHOLD:0.015}
    min-speech-ms: ${VOICE_VAD_MIN_SPEECH_MS:300}
    silence-timeout-ms: ${VOICE_VAD_SILENCE_TIMEOUT_MS:1500}
    max-utterance-ms: ${VOICE_VAD_MAX_UTTERANCE_MS:30000}
  live:
    heartbeat-interval-ms: ${VOICE_LIVE_HEARTBEAT_INTERVAL_MS:15000}
    stale-after-ms: ${VOICE_LIVE_STALE_AFTER_MS:45000}
    max-session-duration-seconds: ${VOICE_LIVE_MAX_SESSION_DURATION_SECONDS:900}
    max-idle-seconds: ${VOICE_LIVE_MAX_IDLE_SECONDS:120}
    max-turns-per-session: ${VOICE_LIVE_MAX_TURNS_PER_SESSION:20}
    max-audio-bytes-per-turn: ${VOICE_LIVE_MAX_AUDIO_BYTES_PER_TURN:10485760}
    frontend-auto-resume-delay-ms: ${VOICE_LIVE_FRONTEND_AUTO_RESUME_DELAY_MS:500}
  runtime:
    summary-endpoint: ${VOICE_RUNTIME_SUMMARY_ENDPOINT:http://127.0.0.1:8091/metrics/summary}
  debug:
    save-audio: ${VOICE_DEBUG_SAVE_AUDIO:false}
    audio-dir: ${VOICE_DEBUG_AUDIO_DIR:/tmp/clinic-voice-debug}
