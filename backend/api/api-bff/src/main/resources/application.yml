spring:
  application:
    name: clinic-management-api

  datasource:
    url: jdbc:postgresql://localhost:5436/clinic_platform
    username: clinic
    password: clinic

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8181/realms/clinic-platform

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: 8089

clinic:
  keycloak:
    admin:
      enabled: true
      serverUrl: http://localhost:8181
      adminRealm: master
      targetRealm: clinic-platform
      clientId: clinic-provisioner
      clientSecret: ${CLINIC_KEYCLOAK_CLIENT_SECRET:}
      username: ${CLINIC_KEYCLOAK_ADMIN_USERNAME:admin}
      password: ${CLINIC_KEYCLOAK_ADMIN_PASSWORD:admin}

  notifications:
    scheduler:
      enabled: ${CLINIC_NOTIFICATIONS_SCHEDULER_ENABLED:true}
      fixedDelay: ${CLINIC_NOTIFICATIONS_SCHEDULER_FIXED_DELAY:PT5M}

logging:
  level:
    root: INFO
    com.deepthoughtnet.clinic: INFO
    org.springframework.security: INFO
