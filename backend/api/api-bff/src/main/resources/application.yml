spring:
  application:
    name: clinic-management-api

  datasource:
    url: jdbc:postgresql://localhost:5437/clinic_management
    username: clinic
    password: clinic

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8182/realms/clinic-management

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: 8089
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

clinic:
  ai:
    enabled: ${CLINIC_AI_ENABLED:false}
    provider: ${CLINIC_AI_PROVIDER:DISABLED}
    request-timeout-seconds: ${CLINIC_AI_REQUEST_TIMEOUT_SECONDS:60}
    consultation:
      max-output-tokens: ${CLINIC_AI_CONSULTATION_MAX_OUTPUT_TOKENS:${GEMINI_MAX_OUTPUT_TOKENS:2048}}
    gemini:
      enabled: ${CLINIC_GEMINI_ENABLED:false}
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      temperature: ${GEMINI_TEMPERATURE:0.1}
      max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:2048}
      timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:${CLINIC_AI_REQUEST_TIMEOUT_SECONDS:60}}
    groq:
      enabled: ${CLINIC_GROQ_ENABLED:false}
      api-key: ${GROQ_API_KEY:}
      model: ${GROQ_MODEL:llama-3.1-70b-versatile}
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
    jobs:
      fixedDelay: ${CLINIC_AI_JOB_FIXED_DELAY:PT1M}
      maxAttempts: ${CLINIC_AI_MAX_ATTEMPTS:3}
      retryBackoffMs: ${CLINIC_AI_RETRY_BACKOFF_MS:60000}

  ocr:
    enabled: ${CLINIC_OCR_ENABLED:true}
    provider: ${CLINIC_OCR_PROVIDER:TESSERACT}
    tesseract:
      executablePath: ${TESSERACT_EXECUTABLE_PATH:tesseract}
      dataPath: ${TESSERACT_DATA_PATH:}
      language: ${TESSERACT_LANGUAGE:eng}
      renderDpi: ${TESSERACT_RENDER_DPI:200}
      pageSegMode: ${TESSERACT_PAGE_SEG_MODE:1}
      ocrEngineMode: ${TESSERACT_OCR_ENGINE_MODE:1}
      requireDataPath: ${TESSERACT_REQUIRE_DATA_PATH:false}
      maxPages: ${CLINIC_OCR_MAX_PAGES:10}

  keycloak:
    admin:
      enabled: true
      serverUrl: http://localhost:8182
      adminRealm: master
      targetRealm: clinic-management
      clientId: admin-cli
      clientSecret: ${CLINIC_KEYCLOAK_CLIENT_SECRET:}
      username: ${CLINIC_KEYCLOAK_ADMIN_USERNAME:admin}
      password: ${CLINIC_KEYCLOAK_ADMIN_PASSWORD:admin}

  storage:
    minio:
      endpoint: ${CLINIC_MINIO_ENDPOINT:http://localhost:9005}
      access-key: ${CLINIC_MINIO_ACCESS_KEY:minio}
      secret-key: ${CLINIC_MINIO_SECRET_KEY:minio123}
      bucket: ${CLINIC_MINIO_BUCKET:clinic-documents}
      auto-create-bucket: ${CLINIC_MINIO_AUTO_CREATE_BUCKET:true}

  notifications:
    enabled: ${CLINIC_NOTIFICATIONS_ENABLED:true}
    channel: ${CLINIC_NOTIFICATIONS_CHANNEL:email}
    dispatcher:
      enabled: ${CLINIC_NOTIFICATIONS_DISPATCHER_ENABLED:true}
      pollingIntervalMs: ${CLINIC_NOTIFICATIONS_RETRY_INTERVAL_MS:30000}
      maxAttempts: ${CLINIC_NOTIFICATIONS_MAX_RETRIES:3}
      retryBackoffMs: ${CLINIC_NOTIFICATIONS_RETRY_BACKOFF_MS:60000}
      batchSize: ${CLINIC_NOTIFICATIONS_BATCH_SIZE:25}
    scheduler:
      enabled: ${CLINIC_NOTIFICATIONS_SCHEDULER_ENABLED:true}
      fixedDelay: ${CLINIC_NOTIFICATIONS_SCHEDULER_FIXED_DELAY:PT5M}
  carepilot:
    reminders:
      enabled: ${CLINIC_CAREPILOT_REMINDERS_ENABLED:false}
      fixed-delay: ${CLINIC_CAREPILOT_REMINDERS_FIXED_DELAY:PT15M}
      batch-size: ${CLINIC_CAREPILOT_REMINDERS_BATCH_SIZE:100}
      refill-estimated-days: ${CLINIC_CAREPILOT_REFILL_ESTIMATED_DAYS:30}
      billing-overdue-days: ${CLINIC_CAREPILOT_BILLING_OVERDUE_DAYS:3}
    retry:
      max-retries: ${CLINIC_CAREPILOT_MAX_RETRIES:3}
      initial-backoff-seconds: ${CLINIC_CAREPILOT_INITIAL_BACKOFF_SECONDS:60}
      max-backoff-seconds: ${CLINIC_CAREPILOT_MAX_BACKOFF_SECONDS:900}
      retryable-statuses: ${CLINIC_CAREPILOT_RETRYABLE_STATUSES:FAILED,PROVIDER_NOT_AVAILABLE,NOT_CONFIGURED}
    scheduler:
      enabled: ${CLINIC_CAREPILOT_SCHEDULER_ENABLED:false}
      fixedDelay: ${CLINIC_CAREPILOT_SCHEDULER_FIXED_DELAY:PT2M}
      batch-size: ${CLINIC_CAREPILOT_SCHEDULER_BATCH_SIZE:25}
    messaging:
      email:
        enabled: ${CLINIC_CAREPILOT_MESSAGING_EMAIL_ENABLED:false}
        from-address: ${CLINIC_CAREPILOT_MESSAGING_EMAIL_FROM_ADDRESS:}
      sms:
        enabled: ${CLINIC_CAREPILOT_MESSAGING_SMS_ENABLED:false}
        provider: ${CLINIC_CAREPILOT_MESSAGING_SMS_PROVIDER:disabled}
        from-number: ${CLINIC_CAREPILOT_MESSAGING_SMS_FROM_NUMBER:}
        api-url: ${CLINIC_CAREPILOT_MESSAGING_SMS_API_URL:}
        api-key: ${CLINIC_CAREPILOT_MESSAGING_SMS_API_KEY:}
        sender-id: ${CLINIC_CAREPILOT_MESSAGING_SMS_SENDER_ID:}
        timeout-ms: ${CLINIC_CAREPILOT_MESSAGING_SMS_TIMEOUT_MS:5000}
        webhook-secret: ${CLINIC_CAREPILOT_SMS_WEBHOOK_SECRET:}
      whatsapp:
        enabled: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_ENABLED:false}
        provider: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_PROVIDER:disabled}
        api-url: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_API_URL:}
        access-token: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_ACCESS_TOKEN:}
        phone-number-id: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_PHONE_NUMBER_ID:}
        from-number: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_FROM_NUMBER:}
        business-account-id: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_BUSINESS_ACCOUNT_ID:}
        timeout-ms: ${CLINIC_CAREPILOT_MESSAGING_WHATSAPP_TIMEOUT_MS:5000}
        webhook-verify-token: ${CLINIC_CAREPILOT_WHATSAPP_WEBHOOK_VERIFY_TOKEN:}
        app-secret: ${CLINIC_CAREPILOT_WHATSAPP_APP_SECRET:}
    provider:
      fail-fast: ${CLINIC_CAREPILOT_PROVIDER_FAIL_FAST:false}

logging:
  level:
    root: INFO
    com.deepthoughtnet.clinic: INFO
    org.springframework.security: INFO
