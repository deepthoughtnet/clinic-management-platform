spring:
  application:
    name: clinic-management-api

  datasource:
    url: jdbc:postgresql://localhost:5437/clinic_management
    username: clinic
    password: clinic

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8182/realms/clinic-management

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: 8089

clinic:
  ai:
    enabled: ${CLINIC_AI_ENABLED:true}

  keycloak:
    admin:
      enabled: true
      serverUrl: http://localhost:8182
      adminRealm: master
      targetRealm: clinic-management
      clientId: admin-cli
      clientSecret: ${CLINIC_KEYCLOAK_CLIENT_SECRET:}
      username: ${CLINIC_KEYCLOAK_ADMIN_USERNAME:admin}
      password: ${CLINIC_KEYCLOAK_ADMIN_PASSWORD:admin}

  storage:
    minio:
      endpoint: ${CLINIC_MINIO_ENDPOINT:http://localhost:9005}
      access-key: ${CLINIC_MINIO_ACCESS_KEY:minio}
      secret-key: ${CLINIC_MINIO_SECRET_KEY:minio123}
      bucket: ${CLINIC_MINIO_BUCKET:clinic-documents}
      auto-create-bucket: ${CLINIC_MINIO_AUTO_CREATE_BUCKET:true}

  notifications:
    enabled: ${CLINIC_NOTIFICATIONS_ENABLED:true}
    channel: ${CLINIC_NOTIFICATIONS_CHANNEL:email}
    dispatcher:
      enabled: ${CLINIC_NOTIFICATIONS_DISPATCHER_ENABLED:true}
      pollingIntervalMs: ${CLINIC_NOTIFICATIONS_RETRY_INTERVAL_MS:30000}
      maxAttempts: ${CLINIC_NOTIFICATIONS_MAX_RETRIES:3}
      retryBackoffMs: ${CLINIC_NOTIFICATIONS_RETRY_BACKOFF_MS:60000}
      batchSize: ${CLINIC_NOTIFICATIONS_BATCH_SIZE:25}
    scheduler:
      enabled: ${CLINIC_NOTIFICATIONS_SCHEDULER_ENABLED:true}
      fixedDelay: ${CLINIC_NOTIFICATIONS_SCHEDULER_FIXED_DELAY:PT5M}

logging:
  level:
    root: INFO
    com.deepthoughtnet.clinic: INFO
    org.springframework.security: INFO
